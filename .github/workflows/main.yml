name: DLsite Ranking Scraper

on:
  schedule:
    # 毎日日本時間 10:00（UTC時間 1:00）に実行
    # ※GitHub Actionsの仕様上、数分〜数十分の開始遅延が発生することがあります
    - cron: '0 1 * * *'
  workflow_dispatch: # 手動で即時実行するための設定

permissions:
  contents: write # 取得したデータをリポジトリに書き戻す権限を許可

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Run Scraper
      run: |
        python dlsite_ranking_manager.py

    - name: Commit and push if changes exist
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/*.json index.html || true
        git commit -m "Auto-update ranking data [skip ci]" || exit 0
        git push
